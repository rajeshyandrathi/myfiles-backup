<template>
    <lightning-accordion class="debit-accordion" active-section-name="debitSection">
        <lightning-accordion-section name="debitSection" label="Debit Orders Details">
            <lightning-card>
                <div slot="title" class="slds-media slds-media_center card-header-bg">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="standard:layers" size="small"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <h2 class="slds-card__header-title">Debit Orders ({recordCount})</h2>
                    </div>
                </div>

                <div slot="actions">
                    <lightning-button-icon icon-name="utility:refresh" variant="border-filled" onclick={refreshTable}></lightning-button-icon>
                    <template if:true={showNewButton}>
                        <lightning-button label="New" variant="brand" onclick={openNewForm}></lightning-button>
                    </template>
                </div>

                <div class="slds-p-around_small datatable-border">
                    <lightning-datatable
                        key-field="tempId"
                        data={records}
                        columns={columns}
                        draft-values={draftValues}
                        onsave={handleSaveDrafts}
                        oncancel={handleCancel}
                        onrowaction={handleRowAction}
                        hide-checkbox-column>
                    </lightning-datatable>
                </div>

                <template if:true={isEmpty}>
                    <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                        No debit orders available.
                    </div>
                </template>
            </lightning-card>
        </lightning-accordion-section>
    </lightning-accordion>

    <!-- MODAL -->
    <template if:true={isModalOpen}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">{modalTitle}</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <!-- TYPE-AHEAD DOI -->
                    <lightning-input 
                        label="DOI Name" 
                        placeholder="Type at least 2 characters..." 
                        value={doiSearchKey} 
                        onchange={handleDOISearch}>
                    </lightning-input>
                    <template if:true={doiOptions.length}>
                        <lightning-combobox 
                            placeholder="Select DOI" 
                            options={doiOptions} 
                            value={doiSelectedId} 
                            onchange={handleDOISelect}>
                        </lightning-combobox>
                    </template>

                    <lightning-input label="DO Reference Number" name="Reference__c" value={currentRecord.Reference__c} onchange={handleInputChange} required></lightning-input>
                    <lightning-input type="date" label="Debit Order Date" name="Date__c" value={currentRecord.Date__c} onchange={handleInputChange} required></lightning-input>
                    <lightning-combobox label="Category" name="Category__c" value={currentRecord.Category__c} options={categoryOptions} onchange={handleInputChange} required></lightning-combobox>
                    <lightning-input type="number" step="0.01" label="Amount" name="Amount__c" value={currentRecord.Amount__c} onchange={handleInputChange} required></lightning-input>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeModal} class="slds-m-right_small"></lightning-button>
                    <lightning-button label="Save" variant="brand" onclick={saveRecord}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
