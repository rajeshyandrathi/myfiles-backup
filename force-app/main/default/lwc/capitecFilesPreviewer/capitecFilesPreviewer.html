<template>
    <lightning-card title="Uploaded Files Preview" icon-name="standard:file">
        <div class="slds-p-around_medium">
            
            <template if:true={hasFiles}>
                <div class="slds-box slds-theme_shade slds-text-align_center slds-m-bottom_small">
                    <lightning-icon 
                        icon-name="doctype:attachment" 
                        size="large">
                    </lightning-icon>
                    
                    <div class="slds-text-heading_medium slds-m-vertical_medium">
                        {fileCountLabel}
                    </div>

                    <lightning-button 
                        variant="brand" 
                        label="View File" 
                        icon-name="utility:preview" 
                        onclick={handlePreview}>
                    </lightning-button>
                </div>

                <!-- Navigation -->
                <div class="slds-grid slds-grid_align-spread">
                    <lightning-button 
                        label="Previous" 
                        icon-name="utility:chevronleft" 
                        onclick={handlePrevious} 
                        disabled={isFirst}>
                    </lightning-button>

                    <lightning-button 
                        label="Next" 
                        icon-name="utility:chevronright" 
                        icon-position="right"
                        onclick={handleNext} 
                        disabled={isLast}>
                    </lightning-button>
                </div>
            </template>

            <template if:false={hasFiles}>
                <div class="slds-text-align_center slds-p-around_large">
                    <p>No files were passed to the previewer.</p>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
